<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dam ROT Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f4; overflow: hidden; }
        .card { background: white; padding: 8px; border-radius: 0; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.75em; font-weight: bold; color: #333; margin-bottom: 2px; }
        input, select { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #fff; }
        .source-select { font-size: 0.75em; color: #0056b3; margin-top: 4px; border: none; background: transparent; padding: 0; text-decoration: underline; cursor: pointer; width: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 4px; border: 1px solid #dee2e6; text-align: center; }
        .stat-label { font-size: 0.7em; text-transform: uppercase; color: #6c757d; font-weight: bold; }
        .stat-value { font-size: 1.1em; font-weight: bold; color: #007bff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
        th, td { border: 1px solid #dee2e6; padding: 6px; text-align: center; }
        th { background: #f1f3f5; }
        .chart-container { position: relative; height: 200px; width: 100%; margin-top: 10px; }
        .legend-custom { font-size: 0.75em; display: flex; justify-content: center; gap: 15px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3 id="damName" style="margin: 0 0 5px 0;">Loading...</h3>
    <div id="nidId" style="color: #666; font-size: 0.8em; margin-bottom: 15px;"></div>

    <div class="input-group">
        <label>Dam Type</label>
        <select id="typeSelector" onchange="calculateAll()">
            <option value="earth">Earth/Embankment</option>
            <option value="concrete">Concrete/Gravity</option>
            <option value="arch">Arch</option>
        </select>
    </div>

    <div class="input-group">
        <label>Breach Head (ft)</label>
        <input type="number" id="heightInput" oninput="calculateAll()">
        <select id="heightSource" class="source-select" onchange="applySource('height')">
            <option value="">-- Change Height Source --</option>
            <option value="hydraulic">Hydraulic Height</option>
            <option value="nid_height">NID Height</option>
            <option value="structural">Structural Height</option>
        </select>
    </div>

    <div class="input-group">
        <label>Storage (ac-ft)</label>
        <input type="number" id="storageInput" oninput="calculateAll()">
        <select id="storageSource" class="source-select" onchange="applySource('storage')">
            <option value="">-- Change Storage Source --</option>
            <option value="nid_storage">NID Storage</option>
            <option value="max_storage">Max Storage</option>
            <option value="normal_storage">Normal Storage</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>Method</th>
                <th>Breach Width (ft)</th>
                <th>Breach Time (hr)</th>
                <th>Peak Q (cfs)</th>
            </tr>
        </thead>
        <tbody>
            <tr style="color: #007bff;">
                <td>Froehlich</td>
                <td id="froBw">--</td>
                <td id="froTc">--</td>
                <td id="froQ">--</td>
            </tr>
            <tr style="color: #dc3545;">
                <td>SMPDBK</td>
                <td id="smpBw">--</td>
                <td id="smpTc">--</td>
                <td id="smpQ">--</td>
            </tr>
        </tbody>
    </table>

    <div class="input-group" style="margin-top: 20px;">
        <label>Routing Distance (mi)</label>
        <input type="number" id="distanceInput" value="10" oninput="calculateAll()">
    </div>

    <div class="chart-container">
        <canvas id="routingChart"></canvas>
    </div>
    <div class="legend-custom">
        <span><b style="color:#007bff;">—</b> Froehlich</span>
        <span><b style="color:#dc3545;">—</b> SMPDBK</span>
    </div>

    <div class="stats-grid" style="margin-top: 20px;">
        <div class="input-group" style="margin-bottom:0;">
            <label>Channel Slope (ft/mi)</label>
            <input type="number" id="slopeInput" value="10.0" step="0.1" oninput="calculateVelocities()">
        </div>
        <div class="input-group" style="margin-bottom:0;">
            <label>Manning's n</label>
            <input type="number" id="nInput" value="0.05" step="0.01" oninput="calculateVelocities()">
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Fread Vel.</div>
            <div id="fread_val" class="stat-value">--</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">OHD Vel.</div>
            <div id="ohd_val" class="stat-value">--</div>
        </div>
        <div class="stat-box" style="grid-column: span 2; background: #e7f3ff; border-color: #b8daff;">
            <div class="stat-label">Est. Travel Time to POI</div>
            <div id="travel_time" class="stat-value">--</div>
        </div>
    </div>
</div>

<script>
    let routingChart = null;
    const params = new URLSearchParams(window.location.search);

    // --- SAFETY CHECK & MEMORY FUNCTIONS ---
    let rawName = params.get('name');
    let isDeselected = (!rawName || rawName === "null" || rawName.trim() === "" || rawName.includes("{"));

    function getSafeStr(paramName, defaultStr = "--") {
        if (isDeselected) {
            let memVal = sessionStorage.getItem('damrot_' + paramName);
            return (memVal && memVal !== "") ? memVal : defaultStr;
        } else {
            let val = params.get(paramName);
            let cleanVal = (val && val !== "null" && val.trim() !== "") ? val : "";
            sessionStorage.setItem('damrot_' + paramName, cleanVal);
            return cleanVal || defaultStr;
        }
    }

    function getSafeNum(...paramNames) {
        if (isDeselected) {
            for (let p of paramNames) {
                let memVal = sessionStorage.getItem('damrot_' + p);
                if (memVal && memVal !== "") {
                    // Strip commas before parsing
                    let num = parseFloat(memVal.replace(/,/g, ''));
                    if (!isNaN(num)) return num;
                }
            }
            return 0;
        } else {
            let validNum = 0;
            let found = false;
            for (let p of paramNames) {
                let val = params.get(p);
                let cleanVal = (val && val !== "null" && val.trim() !== "") ? val : "";
                sessionStorage.setItem('damrot_' + p, cleanVal);
                
                if (!found && cleanVal !== "") {
                    // Strip commas before parsing
                    let num = parseFloat(cleanVal.replace(/,/g, ''));
                    if (!isNaN(num)) {
                        validNum = num;
                        found = true;
                    }
                }
            }
            return validNum;
        }
    }
    // ------------------------------

    // --- INITIAL DATA LOAD FROM URL ---
    document.getElementById('damName').innerText = getSafeStr('name', 'Selected Dam');
    document.getElementById('nidId').innerText = "NID: " + getSafeStr('nidid', '--');
    
    document.getElementById('heightInput').value = getSafeNum('hydraulic', 'nid_height', 'structural');
    document.getElementById('storageInput').value = getSafeNum('nid_storage', 'normal_storage', 'max_storage');

    const rawType = getSafeStr('type', '').toLowerCase();
    const typeSel = document.getElementById('typeSelector');
    if (rawType.includes("arch")) {
        typeSel.value = "arch";
    } else if (rawType.includes("concrete") || rawType.includes("gravity")) {
        typeSel.value = "concrete";
    } else {
        typeSel.value = "earth"; 
    }
    // ----------------------------------

    function applySource(type) {
        if (type === 'height') {
            const field = document.getElementById('heightSource').value;
            if (field) document.getElementById('heightInput').value = getSafeNum(field);
        } else {
            const field = document.getElementById('storageSource').value;
            if (field) document.getElementById('storageInput').value = getSafeNum(field);
        }
        calculateAll();
    }

    // Dedicated function for Velocities (does not touch the chart)
    function calculateVelocities() {
        const h = parseFloat(document.getElementById('heightInput').value) || 0;
        const distMax = parseFloat(document.getElementById('distanceInput').value) || 1;
        const slope = parseFloat(document.getElementById('slopeInput').value) || 10;
        const n = parseFloat(document.getElementById('nInput').value) || 0.05;

        if (h <= 0) {
            document.getElementById('fread_val').innerText = "--";
            document.getElementById('ohd_val').innerText = "--";
            document.getElementById('travel_time').innerText = "--";
            return;
        }

        const vFread = (0.005 / n) * Math.pow(h, (2/3)) * Math.pow(slope, 0.5);
        const vOHD = 3 * Math.pow((h * 0.4), 0.33);
        const travelTime = distMax / vFread;

        document.getElementById('fread_val').innerText = vFread.toFixed(1) + " mph";
        document.getElementById('ohd_val').innerText = vOHD.toFixed(1) + " mph";
        document.getElementById('travel_time').innerText = travelTime.toFixed(1) + " hours";
    }

    // Core calculation function (updates math + chart, then calls velocities)
    function calculateAll() {
        const h = parseFloat(document.getElementById('heightInput').value) || 0;
        const v = parseFloat(document.getElementById('storageInput').value) || 0;
        const distMax = parseFloat(document.getElementById('distanceInput').value) || 1;
        const type = document.getElementById('typeSelector').value;

        if (h <= 0 || v <= 0) {
            document.getElementById('froBw').innerText = "--";
            document.getElementById('froTc').innerText = "--";
            document.getElementById('froQ').innerText = "--";
            document.getElementById('smpBw').innerText = "--";
            document.getElementById('smpTc').innerText = "--";
            document.getElementById('smpQ').innerText = "--";
            if (routingChart) routingChart.data.datasets.forEach(ds => ds.data = []);
            if (routingChart) routingChart.update();
            calculateVelocities(); // clears the velocities
            return;
        }

        // Froehlich Math
        const froBw = 9.5 * Math.pow(v, 0.25) * Math.pow(h, 0.5);
        const froTc = 0.59 * Math.pow(v, 0.47) * Math.pow(h, -0.91);
        const froQ = 60.7 * Math.pow(v, 0.295) * Math.pow(h, 1.24);

        document.getElementById('froBw').innerText = Math.round(froBw);
        document.getElementById('froTc').innerText = froTc.toFixed(2);
        document.getElementById('froQ').innerText = Math.round(froQ).toLocaleString();

        // SMPDBK Math
        let smpBw, smpTc, smpQ;
        if (type === "concrete" || type === "arch") {
            smpBw = 0.9 * 20; smpTc = 0.1;
            smpQ = 3.1 * 20 * Math.pow(h, 1.5);
        } else {
            smpBw = 3 * h; smpTc = 0.5;
            smpQ = (3.1 * smpBw * Math.pow(h, 1.5)) / (1 + (0.015 * smpBw / smpTc));
        }

        document.getElementById('smpBw').innerText = Math.round(smpBw);
        document.getElementById('smpTc').innerText = smpTc.toFixed(1);
        document.getElementById('smpQ').innerText = Math.round(smpQ).toLocaleString();

        // Routing Logic
        let labels = [];
        let froData = [];
        let smpData = [];

        for (let m = 0; m <= distMax; m += 0.5) {
            labels.push(m);
            froData.push(Math.pow(10, (Math.log10(froQ) - 0.03 * m)).toFixed(0));
            smpData.push(Math.pow(10, (Math.log10(smpQ) - 0.03 * m)).toFixed(0));
        }

        updateChart(labels, froData, smpData);
        
        // Sync velocities to the new Head/Distance
        calculateVelocities();
    }

    function updateChart(labels, froData, smpData) {
        const ctx = document.getElementById('routingChart').getContext('2d');
        if (routingChart) routingChart.destroy();
        routingChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Froehlich',
                        data: froData,
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.05)',
                        fill: true,
                        pointRadius: 0,
                        tension: 0.2
                    },
                    {
                        label: 'SMPDBK',
                        data: smpData,
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220, 53, 69, 0.05)',
                        fill: true,
                        pointRadius: 0,
                        tension: 0.2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { title: { display: true, text: 'Discharge (cfs)', font: { size: 10 } } },
                    x: { title: { display: true, text: 'Miles Downstream', font: { size: 10 } } }
                }
            }
        });
    }

    calculateAll();
</script>
</body>
</html>
