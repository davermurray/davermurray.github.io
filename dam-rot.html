<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dam Break ROT</title>
  <style>
    /* Condensed CSS Layout */
    body { font-family: 'Avenir Next', 'Segoe UI', sans-serif; padding: 8px; margin: 0; color: #333; font-size: 0.85em; }
    h4 { margin: 0 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid #eee; font-size: 1.1em; color: #005e95; }
    .header-id { font-weight: normal; color: #666; font-size: 0.85em; }
    .input-group { margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
    label { font-weight: 600; color: #555; }
    select, input { padding: 3px 5px; border: 1px solid #ccc; border-radius: 4px; width: 110px; font-size: 0.95em; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #e0e0e0; padding: 5px 8px; text-align: left; }
    th { background-color: #f8f9fa; font-weight: 600; }
    .highlight { background-color: #e8f5e9; font-weight: bold; color: #2e7d32; }
  </style>
</head>
<body>

  <h4><span id="damName">Select a Dam</span> <span class="header-id">(<span id="nidId">--</span>)</span></h4>
  
  <div class="input-group">
    <label>Dam Type:</label>
    <span id="damType" style="width: 110px; font-weight: 600;">--</span>
  </div>

  <div class="input-group">
    <label>Height Source:</label>
    <select id="heightSelector">
      <option value="hydraulic">Hydraulic</option>
      <option value="structural">Structural</option>
      <option value="nid_height">NID Height</option>
    </select>
  </div>

  <div class="input-group">
    <label>Head (ft):</label>
    <input type="number" id="heightInput" step="0.1">
  </div>

  <div class="input-group">
    <label>Volume (ac-ft):</label>
    <input type="number" id="volumeInput" step="1">
  </div>

  <table>
    <thead>
      <tr>
        <th>Method</th>
        <th>Peak Outflow (cfs)</th>
      </tr>
    </thead>
    <tbody>
      <tr class="highlight">
        <td>Froehlich</td>
        <td id="froehlichQ">--</td>
      </tr>
      <tr>
        <td>SMPDBK</td>
        <td id="smpdbkQ">--</td>
      </tr>
    </tbody>
  </table>

  <script>
    // 1. Get URL parameters (Now including name and NIDID)
    const params = new URLSearchParams(window.location.search);
    
    const damNameParam = params.get('name') || 'Select a Dam';
    const nidIdParam = params.get('nidid') || '--';
    
    const heights = {
      hydraulic: parseFloat(params.get('hydraulic')) || 0,
      structural: parseFloat(params.get('structural')) || 0,
      nid_height: parseFloat(params.get('nid_height')) || 0
    };
    
    const volumeParam = parseFloat(params.get('volume')) || 0;
    const damTypeParam = params.get('type') || '--';

    // 2. Populate the UI elements
    document.getElementById('damName').innerText = damNameParam;
    document.getElementById('nidId').innerText = nidIdParam;
    document.getElementById('damType').innerText = damTypeParam;
    
    document.getElementById('heightInput').value = heights.hydraulic;
    document.getElementById('volumeInput').value = volumeParam;

    // 3. Calculation Logic
    function calculateQ() {
      const h = parseFloat(document.getElementById('heightInput').value) || 0;
      const v = parseFloat(document.getElementById('volumeInput').value) || 0;

      if (h > 0 && v > 0) {
        // Froehlich
        const froehlichQ = 60.7 * Math.pow(v, 0.295) * Math.pow(h, 1.24);
        document.getElementById('froehlichQ').innerText = froehlichQ.toLocaleString('en-US', {maximumFractionDigits: 0});
        
        // SMPDBK (Assuming Br = 3*Hw)
        const breachWidth = 3 * h; 
        const smpdbkQ = 3.1 * breachWidth * Math.pow(h, 1.5);
        document.getElementById('smpdbkQ').innerText = smpdbkQ.toLocaleString('en-US', {maximumFractionDigits: 0});
      } else {
        document.getElementById('froehlichQ').innerText = '--';
        document.getElementById('smpdbkQ').innerText = '--';
      }
    }

    // 4. Interactive Event Listeners
    document.getElementById('heightSelector').addEventListener('change', function(e) {
      document.getElementById('heightInput').value = heights[e.target.value];
      calculateQ();
    });

    document.getElementById('heightInput').addEventListener('input', calculateQ);
    document.getElementById('volumeInput').addEventListener('input', calculateQ);

    calculateQ();
  </script>
</body>
</html>
